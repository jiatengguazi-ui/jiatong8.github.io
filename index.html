<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>病みかわいい少女</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
}

body{
background:#ffd6ec;
overflow:hidden;
height:100vh;
color:#444;
}

/* 背景動画 */

video{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
min-width:100%;
min-height:100%;
object-fit:cover;
opacity:0.35;
z-index:-3;
}

/* ピンクの霧 */

.overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#ffffff66,#ffb6daaa);
z-index:-2;
}

/* タイトル */

.title{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
color:#ff5ca8;
text-shadow:
0 0 10px #ff9ed0,
0 0 30px #ff9ed0;
}

/* サブタイトル */

.subtitle{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
color:#ff77b7;
}

/* ストーリー */

.story{
position:absolute;
top:60%;
left:50%;
transform:translateX(-50%);
width:500px;
text-align:center;
font-size:14px;
color:#ff5c9e;
line-height:1.6;
}

/* フッター */

.footer{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:12px;
color:#ff77b7;
letter-spacing:2px;
}

/* 薬 */

.pill{
position:absolute;
width:40px;
height:20px;
border-radius:20px;
background:linear-gradient(90deg,#ff7aa8,#fff);
animation:float 10s infinite linear;
}

/* 絆創膏 */

.bandage{
position:absolute;
width:40px;
height:18px;
background:#ffe4a8;
border-radius:6px;
box-shadow:0 0 0 2px #f0c87a inset;
animation:float 12s infinite linear;
}

/* 注射器 */

.syringe{
position:absolute;
width:60px;
height:6px;
background:#ddd;
border-radius:3px;
animation:float 14s infinite linear;
}

/* 心電図 */

.heart{
position:absolute;
width:120px;
height:2px;
background:#ff4fa3;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{width:100px}

50%{width:150px}

100%{width:100px}

}

/* 浮かぶ */

@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
}

100%{
transform:translateY(-120vh) rotate(360deg);
}

}

/* カーソル光 */

.cursor{
position:absolute;
width:180px;
height:180px;
border-radius:50%;
background:radial-gradient(circle,#ff9ed066,transparent);
pointer-events:none;
mix-blend-mode:screen;
transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="https://files.catbox.moe/td6hkw.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="title">
病みかわいい少女
</div>

<div class="subtitle">
壊れそうな夢の物語
</div>

<div class="story">

これは一人の少女の物語。<br>
心が壊れそうでも、<br>
夢だけはまだ消えていない。<br><br>

薬と絆創膏でできた世界の中で、<br>
彼女は静かに夢を見ている。

</div>

<div class="footer">
夢のアーカイブ
</div>

<div class="cursor" id="cursor"></div>

<script>

/* カーソル */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* 薬 */

for(let i=0;i<20;i++){

let pill=document.createElement("div")
pill.className="pill"

pill.style.left=Math.random()*100+"%"
pill.style.animationDuration=(6+Math.random()*10)+"s"

document.body.appendChild(pill)

}

/* 絆創膏 */

for(let i=0;i<12;i++){

let band=document.createElement("div")
band.className="bandage"

band.style.left=Math.random()*100+"%"
band.style.animationDuration=(8+Math.random()*10)+"s"

document.body.appendChild(band)

}

/* 注射器 */

for(let i=0;i<8;i++){

let syr=document.createElement("div")
syr.className="syringe"

syr.style.left=Math.random()*100+"%"
syr.style.animationDuration=(10+Math.random()*12)+"s"

document.body.appendChild(syr)

}

/* 心電図 */

let heart=document.createElement("div")
heart.className="heart"
heart.style.top="20%"
heart.style.left="50%"
document.body.appendChild(heart)

</script>

</body>
</html>
